# See https://github.com/bazel-contrib/publish-to-bcr
name: Publish to BCR

on:
  # Allow the publish workflow to be called from another workflow.
  # In this case, we trigger it from the release.yaml workflow.
  workflow_call:
    inputs:
      release_version:
        required: true
        type: string
    secrets:
      BCR_PUBLISH_TOKEN:
        required: true
  # In case of problems, let release engineers retry by manually dispatching
  # the workflow from the GitHub UI.
  workflow_dispatch:
    inputs:
      release_version:
        required: true
        type: string
        description: Release version to publish to the Bazel Central Registry
      templates_ref:
        default: ''
        type: string
        description: Override the ref to read .bcr templates from
jobs:
  publish:
    uses: bazel-contrib/publish-to-bcr/.github/workflows/publish.yaml@v1.1.0
    with:
      # Carry the SLSA build-provenance attestation produced by
      # `release.yaml`'s reusable release_ruleset workflow into the BCR
      # submission. The reusable workflow downloads the attestation
      # from the GitHub Attestation Store and attaches it to the
      # registry PR.
      attest: true
      tag_name: ${{ inputs.release_version }}
      author_name: periareon-bot
      author_email: 260522848+periareon-bot@users.noreply.github.com
      # Tags don't include a "v" prefix
      tag_prefix: ""
      # GitHub repository which is a fork of the upstream where the Pull Request will be opened.
      registry_fork: periareon/bazel-central-registry
      templates_ref: ${{ inputs.templates_ref || inputs.release_version }}
      draft: false
    permissions:
      contents: write
      # `id-token: write` + `attestations: write` together let the
      # reusable workflow read and re-attest the release-archive
      # provenance during the BCR submission.
      id-token: write
      attestations: write
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
